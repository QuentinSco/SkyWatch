name: Remove node_modules from git tracking

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/remove-node-modules.yml'

jobs:
  remove-node-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove node_modules from git index
        run: |
          git rm -r --cached node_modules/ 2>/dev/null || echo "node_modules already untracked"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --cached --quiet || git commit -m "fix: remove node_modules from git tracking"
          git push

      - name: Self-destruct this workflow file
        run: |
          git rm .github/workflows/remove-node-modules.yml
          git commit -m "ci: remove one-shot workflow (done)"
          git push
